methodology: The experiment was designed to study the influence of the flash duration on a calibration-less P300-based BCI
  system with wet electrodes and as a screening session for potential candidates for a broader multi-user BCI study. The visual
  P300 is an event-related potential (ERP) elicited by an expected but unpredictable target visual stimulation (oddball paradigm),
  with peaking amplitude 240-600 ms after stimulus onset. During the experiment, the output of a real-time adaptive Riemannian
  Minimum Distance to Mean (RMDM) classifier was used for assessing the participants' command. This scheme allows a calibration-free
  classifier. Before and after the three game sessions, around one minute of resting state and eyes closed conditions were
  recorded. The interface of Brain Invaders is composed of 36 aliens. In the Brain Invaders P300 paradigm, a repetition is
  composed of 12 flashes of pseudo-random groups of six symbols chosen in such a way that after each repetition each symbol
  has flashed exactly two times. A game session was compounded by nine levels, consisting in a unique and predefined configuration
  of the 36 symbols of the interface. Aliens slowly and regularly moved according to a predefined path keeping constant the
  inter-distance between adjacent aliens to maintain high player's attention during the whole experiment.
